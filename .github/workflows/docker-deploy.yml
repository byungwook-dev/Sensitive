name: CI/CD to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 환경 강제 적용

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # 최신 버전

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'        # Node.js 24로 맞춤

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/sensitive:latest .

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/sensitive:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/sensitive:latest
            docker stop sensitive || true
            docker rm sensitive || true
            docker run -d --name sensitive -p 80:3000 ${{ secrets.DOCKER_USERNAME }}/sensitive:latest
